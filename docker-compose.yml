services:

  mysql:
    image: mysql:8.0
    container_name: scheduled-stock-purchase-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - scheduled-stock-purchase-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: scheduled-stock-purchase-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - scheduled-stock-purchase-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: scheduled-stock-purchase-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - scheduled-stock-purchase-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: scheduled-stock-purchase-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: scheduled-stock-purchase-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - scheduled-stock-purchase-network

  api:
    build:
      context: .
      dockerfile: src/Scheduled.Stock.Purchase.Api/Dockerfile
    container_name: scheduled-stock-purchase-api
    depends_on:
      - mysql
      - kafka
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=${MYSQL_DATABASE};user=${MYSQL_USER};password=${MYSQL_PASSWORD}"
      Kafka__BootstrapServers: kafka:9092
    networks:
      - scheduled-stock-purchase-network

volumes:
  mysql_data:

networks:
  scheduled-stock-purchase-network:
    driver: bridge